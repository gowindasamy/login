<!DOCTYPE html>
<html>
<head>

<title>🔐 LOGIN PAGE 🔐</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
#000000,
#001f1f,
#002244,
#000000
);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
z-index:-2;
}

.glow{
position:fixed;
width:500px;
height:500px;
background:cyan;
filter:blur(170px);
opacity:0.15;
border-radius:50%;
top:-100px;
left:-100px;
animation:moveGlow 8s linear infinite alternate;
z-index:-1;
}

/* CONTAINER */

.box{

width:340px;

margin:120px auto;

padding:35px;

border-radius:25px;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(0,255,255,0.3);

backdrop-filter:blur(10px);

box-shadow:
0 0 30px rgba(0,255,255,0.3);

}

/* TITLE */

h1{

font-size:42px;

margin-bottom:25px;

background:
linear-gradient(
90deg,
cyan,
lime,
white
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* INPUT */

input{

width:90%;

padding:15px;

margin:12px 0;

border:none;

outline:none;

border-radius:14px;

font-size:17px;

background:
rgba(255,255,255,0.08);

color:white;

box-shadow:
0 0 15px cyan;

}

/* BUTTON */

button{

padding:14px 30px;

margin-top:15px;

border:none;

border-radius:14px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#00ffff,
#00ff99,
#00ccff
);

color:black;

box-shadow:
0 0 20px cyan;

transition:0.3s;

}

button:hover{

transform:
scale(1.05);

box-shadow:
0 0 35px cyan;

}

/* POPUP */

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.85);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

.popupbox{

background:black;

padding:30px;

border-radius:20px;

box-shadow:
0 0 30px cyan;

width:320px;

}

/* ANIMATION */

@keyframes bgmove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

@keyframes moveGlow{

0%{
transform:translate(0,0);
}

100%{
transform:translate(400px,300px);
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="glow"></div>

<div class="box">

<h1>
🔐 LOGIN
</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
🚀 LOGIN
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOGIN */

window.login =
async function(){

let username =
document.getElementById(
"username"
).value;

let password =
document.getElementById(
"password"
).value;

const params =
new URLSearchParams(
window.location.search
);

let currentPage =
params.get("page");

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

/* USER NOT FOUND */

if(!userSnap.exists()){

alert("User Not Found ❌");

return;

}

const data =
userSnap.data();

/* WRONG PASSWORD */

if(data.password != password){

alert("Wrong Password ❌");

return;

}

let access =
data.pageAccess || [];

let count =
data.loginCount || 0;

let limit =
data.loginLimit || 999999;

/* LOCK CHECK */

if(
count >= limit
&& limit != 999999
){

alert(
"ACCOUNT LOCKED ❌"
);

return;

}

/* LOGIN DATA */

const now =
new Date();

const loginData = {

date:
now.toLocaleDateString(),

time:
now.toLocaleTimeString()

};

/* JEE PAGE */

if(currentPage == "jee"){

if(
access.includes("jee")
){

loginData.page =
"JEE";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

alert("Login Success ✅");

window.location.href =

"https://gowindasamy.github.io/jee/?access=true";

}

else{

alert("ACCESS DENIED ❌");

}

}

/* 12TH PAGE */

else if(currentPage == "12th"){

if(
access.includes("12th")
){

loginData.page =
"12TH";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

alert("Login Success ✅");

window.location.href =

"https://gowindasamy.github.io/12th/?access=true";

}

else{

alert("ACCESS DENIED ❌");

}

}

/* TOPPERZONE */

else if(currentPage == "topperzone"){

if(
access.includes("topperzone")
){

loginData.page =
"TOPPERZONE";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

alert("Login Success ✅");

window.location.href =

"https://gowindasamy.github.io/TopperZone/?access=true";

}

else{

alert("ACCESS DENIED ❌");

}

}

/* CENTRAL LOGIN */

else{

/* MULTIPLE ACCESS */

if(access.length > 1){

showChoosePopup(
access,
userRef,
data,
count,
loginData
);

}

/* JEE */

else if(
access.includes("jee")
){

loginData.page =
"JEE";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

alert("Login Success ✅");

window.location.href =

"https://gowindasamy.github.io/jee/?access=true";

}

/* 12TH */

else if(
access.includes("12th")
){

loginData.page =
"12TH";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

alert("Login Success ✅");

window.location.href =

"https://gowindasamy.github.io/12th/?access=true";

}

/* TOPPERZONE */

else if(
access.includes("topperzone")
){

loginData.page =
"TOPPERZONE";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

alert("Login Success ✅");

window.location.href =

"https://gowindasamy.github.io/TopperZone/?access=true";

}

}

}

/* CHOOSE POPUP */

window.showChoosePopup =
function(
access,
userRef,
data,
count,
loginData
){

const popup =
document.createElement("div");

popup.className =
"popup";

const box =
document.createElement("div");

box.className =
"popupbox";

box.innerHTML =

`
<h2 style="color:cyan;">
🌍 Choose Page
</h2>
`;

const select =
document.createElement("select");

select.style.width =
"90%";

select.style.padding =
"15px";

select.style.marginTop =
"20px";

select.style.borderRadius =
"12px";

select.style.fontSize =
"18px";

/* OPTIONS */

if(
access.includes("jee")
){

select.innerHTML +=

`

<option value="jee">
🔥 JEE
</option>

`;

}

if(
access.includes("12th")
){

select.innerHTML +=

`

<option value="12th">
📚 12TH
</option>

`;

}

if(
access.includes("topperzone")
){

select.innerHTML +=

`

<option value="topperzone">
🚀 TOPPERZONE
</option>

`;

}

/* BUTTON */

const btn =
document.createElement("button");

btn.innerHTML =
"🚀 OPEN";

btn.onclick =
async function(){

/* JEE */

if(select.value == "jee"){

loginData.page =
"JEE";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

window.location.href =

"https://gowindasamy.github.io/jee/?access=true";

}

/* 12TH */

else if(
select.value == "12th"
){

loginData.page =
"12TH";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

window.location.href =

"https://gowindasamy.github.io/12th/?access=true";

}

/* TOPPERZONE */

else{

loginData.page =
"TOPPERZONE";

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

window.location.href =

"https://gowindasamy.github.io/TopperZone/?access=true";

}

};

box.appendChild(select);

box.appendChild(btn);

popup.appendChild(box);

document.body.appendChild(
popup
);

}

</script>

</body>
</html>
