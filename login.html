<!DOCTYPE html>
<html>
<head>

<title>🔥 LOGIN PAGE 🔥</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:black;
font-family:Arial,sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;

}

/* BACKGROUND */

.bg{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(
135deg,
#000000,
#001a00,
#002244,
#000000
);

background-size:400% 400%;

animation:bgmove 10s ease infinite;

z-index:-2;

}

/* GLOW */

.glow{

position:fixed;

width:400px;
height:400px;

background:cyan;

border-radius:50%;

filter:blur(150px);

opacity:0.15;

top:-100px;
left:-100px;

animation:moveGlow 8s infinite alternate;

z-index:-1;

}

/* LOGIN BOX */

.loginbox{

width:90%;
max-width:420px;

padding:40px;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(0,255,255,0.3);

border-radius:25px;

backdrop-filter:blur(10px);

box-shadow:
0 0 30px rgba(0,255,255,0.3);

text-align:center;

}

/* TITLE */

h1{

font-size:45px;

margin-bottom:30px;

background:
linear-gradient(
90deg,
cyan,
lime,
white
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 15px cyan;

}

/* INPUTS */

input{

width:100%;

padding:18px;

margin:12px 0;

font-size:18px;

border:none;
outline:none;

border-radius:15px;

background:
rgba(255,255,255,0.08);

color:white;

box-shadow:
0 0 20px cyan;

}

/* BUTTON */

button{

width:100%;

padding:18px;

margin-top:20px;

font-size:20px;

font-weight:bold;

border:none;

border-radius:15px;

cursor:pointer;

background:
linear-gradient(
45deg,
lime,
cyan
);

color:black;

box-shadow:
0 0 25px cyan;

transition:0.3s;

}

button:hover{

transform:scale(1.03);

box-shadow:
0 0 35px lime;

}

/* TEXT */

.info{

margin-top:20px;

font-size:18px;

color:#00ffff;

text-shadow:
0 0 10px cyan;

}

/* ANIMATIONS */

@keyframes bgmove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

@keyframes moveGlow{

0%{
transform:
translate(0,0);
}

100%{
transform:
translate(300px,250px);
}

}

/* MOBILE */

@media(max-width:768px){

h1{

font-size:35px;

}

.loginbox{

padding:30px 20px;

}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="glow"></div>

<div class="loginbox">

<h1>

🔥 LOGIN 🔥

</h1>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

🚀 LOGIN

</button>

<p class="info">

JEE • 12th Central Login System

</p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOGIN */

window.login =
async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(
username.trim()==""
||
password.trim()==""
){

alert(
"Enter Username & Password ❌"
);

return;

}

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){

alert("User Not Found ❌");

return;

}

const data =
userSnap.data();

/* PASSWORD CHECK */

if(
data.password != password
){

alert("Wrong Password ❌");

return;

}

/* LOGIN LIMIT */

let limit =
data.loginLimit || 999999;

let count =
data.loginCount || 0;

if(
count >= limit
&& limit != 999999
){

alert("Account Locked 🔒");

return;

}

/* PAGE ACCESS */

const page =
new URLSearchParams(
window.location.search
).get("page");

/* ACCESS CHECK */

if(
page=="jee"
&&
data.pageAccess!="jee"
&&
data.pageAccess!="both"
){

alert(
"JEE Access Denied ❌"
);

return;

}

if(
page=="12th"
&&
data.pageAccess!="12th"
&&
data.pageAccess!="both"
){

alert(
"12th Access Denied ❌"
);

return;

}

/* UPDATE LOGIN */

const now =
new Date();

const loginData = {

date:
now.toLocaleDateString(),

time:
now.toLocaleTimeString()

};

await updateDoc(userRef,{

loginCount:count+1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

/* SUCCESS */

alert("Login Success ✅");

/* REDIRECT */

if(page=="jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(page=="12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

const choose =
prompt(
"Open:\njee\n12th"
);

if(choose=="jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(choose=="12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

alert("Invalid Option ❌");

}

}

}

</script>

</body>
</html>
