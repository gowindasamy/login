<!DOCTYPE html>
<html>
<head>
<title>🔐 Login</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
45deg,
#000000,
#001a00,
#002244,
#000000
);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
z-index:-2;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.loginbox{
margin-top:100px;
}

h1{
font-size:50px;
animation:rainbow 4s linear infinite;
text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;
}

input{
padding:15px;
margin:12px;
width:280px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
box-shadow:0 0 20px lime;
}

button{
padding:15px 30px;
background:linear-gradient(
45deg,
lime,
cyan
);
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
font-weight:bold;
color:black;
box-shadow:0 0 25px cyan;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

@keyframes bgmove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<canvas id="matrix"></canvas>

<div class="loginbox">

<h1>🔐 LOGIN 🔐</h1>

<input type="text"
id="username"
placeholder="Enter Username">

<br>

<input type="password"
id="password"
placeholder="Enter Password">

<br>

<button onclick="login()">
🚀 LOGIN
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
arrayUnion
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain: "tngslogin.firebaseapp.com",

projectId: "tngslogin",

storageBucket: "tngslogin.firebasestorage.app",

messagingSenderId: "552680193680",

appId: "1:552680193680:web:54db58e0e418a2b63aa215"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.login = async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

const docRef =
doc(db,"users",username);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

if(docSnap.data().password == password){

if(docSnap.data().status == "locked"){

alert("Account Locked ❌");

return;

}

let count =
docSnap.data().loginCount || 0;

let limit =
docSnap.data().loginLimit || 1;

count++;

if(count >= limit){

await updateDoc(docRef,{

loginCount: count,

status:"locked",

loginHistory: arrayUnion({

date:
String(new Date().getDate()).padStart(2,'0')
+ "/"
+ String(new Date().getMonth()+1).padStart(2,'0')
+ "/"
+ new Date().getFullYear(),

time:
new Date().toLocaleTimeString('en-IN')

})

});

}

else{

await updateDoc(docRef,{

loginCount: count,

loginHistory: arrayUnion({

date:
String(new Date().getDate()).padStart(2,'0')
+ "/"
+ String(new Date().getMonth()+1).padStart(2,'0')
+ "/"
+ new Date().getFullYear(),

time:
new Date().toLocaleTimeString('en-IN')

})

});

}

alert("Login Successful 🚀");

window.location.href =
"https://gowindasamy.github.io/jee/index.html?access=true";

}

else{

alert("Wrong Password ❌");

}

}

else{

alert("User Not Found ❌");

}

}

</script>

<script>

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const letters =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";

const fontSize = 14;

const columns =
canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++){

drops[x] = 1;

}

function draw(){

ctx.fillStyle =
"rgba(0,0,0,0.05)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle = "#00ff99";

ctx.font =
fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

const text =
letters.charAt(
Math.floor(
Math.random()
* letters.length
)
);

ctx.fillText(
text,
i * fontSize,
drops[i] * fontSize
);

if(
drops[i] * fontSize
> canvas.height
&& Math.random() > 0.975
){

drops[i] = 0;

}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
