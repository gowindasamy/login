<!DOCTYPE html>
<html>
<head>
<title>🔐 Login</title>
</head>

<body>

<h1>🔐 LOGIN 🔐</h1>

<input type="text"
id="username"
placeholder="Username">

<br><br>

<input type="password"
id="password"
placeholder="Password">

<br><br>

<button onclick="login()">
LOGIN
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain: "tngslogin.firebaseapp.com",

projectId: "tngslogin",

storageBucket: "tngslogin.firebasestorage.app",

messagingSenderId: "552680193680",

appId: "1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.login = async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

const docRef =
doc(db,"users",username);

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

if(docSnap.data().password == password){

alert("Login Successful 🚀");

window.location.href =
"https://gowindasamy.github.io/jee/index.html?access=true";

}

else{

alert("Wrong Password ❌");

}

}

else{

alert("User Not Found ❌");

}

}

</script>

</body>
</html>
