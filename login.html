<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
🔥 PREMIUM LOGIN 🔥
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;
align-items:center;

background:
radial-gradient(
circle at top,
#111111,
#000000 70%
);

font-family:
'Poppins',
sans-serif;

overflow-x:hidden;

}

/* BACKGROUND GLOW */

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:
radial-gradient(
circle,
rgba(255,80,0,0.35),
transparent 70%
);

filter:blur(120px);

animation:
moveGlow 8s ease-in-out infinite alternate;

}

/* LOGIN BOX */

.box{

position:relative;

width:420px;

max-width:92%;

padding:45px 35px;

border-radius:30px;

background:
rgba(20,20,20,0.88);

backdrop-filter:
blur(15px);

border:
1px solid rgba(255,120,0,0.18);

box-shadow:

0 0 25px rgba(255,80,0,0.2),
0 0 60px rgba(255,40,0,0.08);

text-align:center;

z-index:2;

animation:
glow 2s linear infinite;

}

/* TITLE */

.box h1{

font-size:52px;

margin-bottom:40px;

font-weight:900;

letter-spacing:3px;

background:
linear-gradient(
90deg,
#ff3300,
#ff6600,
#ffaa00
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(255,80,0,0.5);

}

/* INPUT */

.box input{

width:100%;

padding:18px 22px;

margin-bottom:24px;

border:none;

outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

font-size:20px;

color:white;

box-shadow:
inset 0 0 10px rgba(255,255,255,0.03),
0 0 18px rgba(255,80,0,0.12);

transition:0.3s;

}

.box input:focus{

transform:scale(1.02);

box-shadow:
0 0 25px rgba(255,120,0,0.35);

}

/* BUTTON */

.box button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:22px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(
90deg,
#ff3300,
#ff6600,
#ffaa00
);

color:white;

letter-spacing:2px;

box-shadow:
0 0 25px rgba(255,80,0,0.4);

transition:0.3s;

}

.box button:hover{

transform:
translateY(-4px)
scale(1.02);

box-shadow:
0 0 40px rgba(255,120,0,0.7);

}

/* PLACEHOLDER */

::placeholder{

color:
rgba(255,255,255,0.45);

}

/* ANIMATIONS */

@keyframes moveGlow{

0%{
transform:
translate(-100px,-50px);
}

100%{
transform:
translate(120px,80px);
}

}

@keyframes glow{

0%{
box-shadow:
0 0 20px #ff3300;
}

50%{
box-shadow:
0 0 40px #ff8800;
}

100%{
box-shadow:
0 0 20px #ff3300;
}

}

</style>

</head>

<body>

<div class="box">

<h1>
🔥 LOGIN
</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
🚀 LOGIN
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOGIN */

window.login =
async function(){

let username =
document.getElementById(
"username"
).value.trim();

let password =
document.getElementById(
"password"
).value.trim();

if(!username || !password){

alert(
"Enter Username & Password ❌"
);

return;

}

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){

alert("User Not Found ❌");

return;

}

const data =
userSnap.data();

if(data.password != password){

alert("Wrong Password ❌");

return;

}

alert(
"Login Successful ✅"
);

}

</script>

</body>
</html>
