<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
🔥 PREMIUM LOGIN 🔥
</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

display:flex;

justify-content:center;
align-items:center;

padding:20px 0;

background:
linear-gradient(
135deg,

#000000,
#120000,
#001111,
#000022,
#000000

);

background-size:
400% 400%;

animation:
bgMove 5s linear infinite;

font-family:
'Poppins',
sans-serif;

overflow-x:hidden;

}

/* BACKGROUND GLOW */

body::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:

radial-gradient(

circle,

rgba(255,80,0,0.28),

transparent 70%

);

filter:blur(100px);

animation:
moveGlow 4s ease-in-out infinite alternate;

}

/* LOGIN BOX */

.box{

position:relative;

width:88%;

max-width:360px;

padding:34px 22px;

border-radius:30px;

background:
rgba(15,15,15,0.82);

backdrop-filter:
blur(18px);

border:
1px solid rgba(255,255,255,0.08);

box-shadow:

0 0 16px rgba(255,0,0,0.18),

0 0 28px rgba(0,255,255,0.12),

0 0 45px rgba(255,0,255,0.08);

text-align:center;

z-index:2;

animation:
rainbowGlow 1.2s linear infinite;

margin:auto;

}

/* TITLE */

.box h1{

font-size:44px;

margin-bottom:32px;

font-weight:900;

letter-spacing:2px;

font-family:
'Orbitron',
sans-serif;

background:
linear-gradient(

90deg,

#ff0000,
#ff8800,
#ffff00,
#00ffcc,
#00aaff,
#ff00ff

);

background-size:
300% 300%;

animation:
textFlow 2s linear infinite;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 0 10px rgba(255,255,255,0.12),

0 0 20px rgba(255,0,255,0.18);

}

/* INPUT */

.box input{

width:100%;

padding:15px 16px;

margin-bottom:20px;

border:none;

outline:none;

border-radius:16px;

background:
rgba(255,255,255,0.05);

font-size:17px;

font-weight:600;

color:white;

box-shadow:

0 0 10px rgba(0,255,255,0.12),

0 0 18px rgba(255,0,255,0.05);

transition:0.3s;

}

.box input:focus{

transform:scale(1.02);

box-shadow:

0 0 15px cyan,

0 0 28px magenta,

0 0 40px orange;

}

/* BUTTON */

.box button{

width:100%;

padding:15px;

border:none;

border-radius:16px;

font-size:19px;

font-weight:800;

cursor:pointer;

font-family:
'Orbitron',
sans-serif;

background:
linear-gradient(

90deg,

#ff0000,
#ff8800,
#ffff00,
#00ffcc,
#00aaff,
#ff00ff

);

background-size:
300% 300%;

animation:
textFlow 2s linear infinite;

color:white;

letter-spacing:2px;

box-shadow:

0 0 16px rgba(255,0,0,0.2),

0 0 30px rgba(0,255,255,0.15),

0 0 40px rgba(255,0,255,0.08);

transition:0.3s;

}

.box button:hover{

transform:
translateY(-3px)
scale(1.02);

box-shadow:

0 0 20px red,

0 0 35px cyan,

0 0 50px magenta;

}

/* PLACEHOLDER */

::placeholder{

color:
rgba(255,255,255,0.42);

}

/* POPUP */

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.88);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

padding:20px;

}

.popupbox{

background:
rgba(20,20,20,0.95);

padding:30px;

border-radius:22px;

width:100%;
max-width:320px;

text-align:center;

border:
1px solid rgba(255,120,0,0.2);

box-shadow:
0 0 28px rgba(255,80,0,0.25);

}

.popupbox h2{

margin-bottom:22px;

font-size:28px;

font-family:
'Orbitron',
sans-serif;

background:
linear-gradient(
90deg,
#ff0000,
#00ffff,
#ff00ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.popupbox select{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:14px;

font-size:16px;

margin-bottom:18px;

background:
rgba(255,255,255,0.08);

color:white;

}

.popupbox button{

width:100%;

}

/* ANIMATIONS */

@keyframes moveGlow{

0%{
transform:
translate(-70px,-40px);
}

100%{
transform:
translate(90px,60px);
}

}

@keyframes rainbowGlow{

0%{
box-shadow:
0 0 18px red;
}

25%{
box-shadow:
0 0 22px orange;
}

50%{
box-shadow:
0 0 24px cyan;
}

75%{
box-shadow:
0 0 24px magenta;
}

100%{
box-shadow:
0 0 18px red;
}

}

@keyframes textFlow{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

</style>

</head>

<body>

<div class="box">

<h1>
🔥 LOGIN
</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password
