<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
🔥 PREMIUM LOGIN 🔥
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,

#000000,
#001a00,
#003300,
#001100,
#000000

);

background-size:
400% 400%;

animation:
greenBg 6s linear infinite;

font-family:
'Poppins',
sans-serif;

overflow:hidden;

}

/* BACKGROUND GLOW */

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:

radial-gradient(

circle,

rgba(0,255,100,0.35),

transparent 70%

);

filter:blur(120px);

animation:
moveGlow 8s ease-in-out infinite alternate;

}

/* LOGIN BOX */

.box{

position:relative;

width:420px;

padding:45px 35px;

border-radius:30px;

background:
rgba(20,20,20,0.88);

backdrop-filter:
blur(15px);

border:
1px solid rgba(0,255,120,0.25);

box-shadow:

0 0 25px rgba(0,255,120,0.25),

0 0 60px rgba(0,255,120,0.15);

text-align:center;

z-index:2;

animation:
rainbowGlow 1.5s linear infinite;

}

/* TITLE */

.box h1{

font-size:52px;

margin-bottom:40px;

font-weight:900;

letter-spacing:3px;

background:
linear-gradient(

90deg,

#00ff66,
#00ffaa,
#00ffcc,
#66ff99

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(0,255,120,0.5);

animation:
titleGlow 1.8s linear infinite alternate;

}

/* INPUT */

.box input{

width:100%;

padding:18px 22px;

margin-bottom:24px;

border:none;

outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

font-size:20px;

color:white;

box-shadow:

inset 0 0 10px rgba(255,255,255,0.03),

0 0 18px rgba(0,255,120,0.12);

transition:0.3s;

}

.box input:focus{

transform:scale(1.02);

box-shadow:

0 0 25px rgba(0,255,120,0.5);

}

/* BUTTON */

.box button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:22px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(

90deg,

#00ff66,
#00ffaa,
#00ffcc

);

color:black;

letter-spacing:2px;

box-shadow:

0 0 25px rgba(0,255,120,0.4);

transition:0.3s;

animation:
buttonPulse 1.4s infinite;

}

.box button:hover{

transform:
translateY(-4px)
scale(1.02);

box-shadow:

0 0 40px rgba(0,255,120,0.8);

}

/* PLACEHOLDER */

::placeholder{

color:
rgba(255,255,255,0.45);

}

/* POPUP */

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.88);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

.popupbox{

background:
rgba(20,20,20,0.95);

padding:35px;

border-radius:25px;

width:350px;

text-align:center;

border:
1px solid rgba(0,255,120,0.2);

box-shadow:
0 0 35px rgba(0,255,120,0.3);

}

.popupbox h2{

margin-bottom:25px;

font-size:32px;

color:#00ff99;

}

.popupbox select{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:15px;

font-size:18px;

margin-bottom:20px;

background:
rgba(255,255,255,0.08);

color:white;

}

.popupbox button{

width:100%;

}

/* ANIMATIONS */

@keyframes moveGlow{

0%{
transform:
translate(-100px,-50px);
}

100%{
transform:
translate(120px,80px);
}

}

@keyframes greenBg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

@keyframes rainbowGlow{

0%{

box-shadow:
0 0 25px #00ff66,
0 0 60px #00ff99;

}

50%{

box-shadow:
0 0 35px #00ffaa,
0 0 80px #00ffcc;

}

100%{

box-shadow:
0 0 25px #00ff66,
0 0 60px #00ff99;

}

}

@keyframes titleGlow{

0%{

filter:
drop-shadow(0 0 10px #00ff66);

}

100%{

filter:
drop-shadow(0 0 30px #00ffaa);

}

}

@keyframes buttonPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div class="box">

<h1>
🔥 LOGIN
</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
🚀 LOGIN
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOGIN */

window.login =
async function(){

let username =
document.getElementById(
"username"
).value;

let password =
document.getElementById(
"password"
).value;

const params =
new URLSearchParams(
window.location.search
);

let currentPage =
params.get("page");

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){

alert("User Not Found ❌");
return;

}

const data =
userSnap.data();

if(data.password != password){

alert("Wrong Password ❌");
return;

}

let access =
data.pageAccess || [];

let count =
data.loginCount || 0;

let limit =
data.loginLimit || 999999;

if(
count >= limit
&& limit != 999999
){

alert("ACCOUNT LOCKED ❌");
return;

}

const now =
new Date();

const loginData = {

date:
now.toLocaleDateString(),

time:
now.toLocaleTimeString()

};

if(currentPage){

if(
!access.includes(currentPage)
){

alert("ACCESS DENIED ❌");
return;

}

loginData.page =
currentPage.toUpperCase();

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

if(currentPage == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(currentPage == "12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/TopperZone/?access=true";

}

return;

}

if(access.length > 1){

showChoosePopup(
access,
userRef,
data,
count,
loginData
);

}

else{

const page =
access[0];

loginData.page =
page.toUpperCase();

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

if(page == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(page == "12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/TopperZone/?access=true";

}

}

}

/* CHOOSE POPUP */

window.showChoosePopup =
function(
access,
userRef,
data,
count,
loginData
){

const popup =
document.createElement("div");

popup.className =
"popup";

const box =
document.createElement("div");

box.className =
"popupbox";

box.innerHTML =

`
<h2>
🌍 Choose Page
</h2>
`;

const select =
document.createElement("select");

if(access.includes("jee")){

select.innerHTML +=

`
<option value="jee">
🔥 JEE
</option>
`;

}

if(access.includes("12th")){

select.innerHTML +=

`
<option value="12th">
📚 12TH
</option>
`;

}

if(access.includes("topperzone")){

select.innerHTML +=

`
<option value="topperzone">
🚀 TOPPERZONE
</option>
`;

}

const btn =
document.createElement("button");

btn.innerHTML =
"🚀 OPEN";

btn.onclick =
async function(){

let selected =
select.value;

loginData.page =
selected.toUpperCase();

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

if(selected == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(selected == "12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/TopperZone/?access=true";

}

};

box.appendChild(select);

box.appendChild(btn);

popup.appendChild(box);

document.body.appendChild(
popup
);

}

</script>

</body>
  </html>
