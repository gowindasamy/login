<!DOCTYPE html>
<html>
<head>

<title>🔥 LOGIN PAGE 🔥</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* DIGITAL WAVE BACKGROUND */

#wavebg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
background:black;
}

#wavebg::before{

content:"";

position:absolute;
top:20%;
left:-50%;

width:200%;
height:300px;

background:
rgba(0,255,255,0.15);

border-radius:45%;

filter:blur(60px);

animation:waveMove 10s linear infinite;

}

#wavebg::after{

content:"";

position:absolute;
bottom:10%;
left:-50%;

width:200%;
height:250px;

background:
rgba(0,255,0,0.12);

border-radius:40%;

filter:blur(70px);

animation:waveMove2 14s linear infinite;

}

/* ANIMATION */

@keyframes waveMove{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(10%)
translateY(20px)
rotate(2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

@keyframes waveMove2{

0%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

50%{
transform:
translateX(-10%)
translateY(-20px)
rotate(-2deg);
}

100%{
transform:
translateX(0)
translateY(0)
rotate(0deg);
}

}

/* TITLE */

h1{
margin-top:80px;
font-size:55px;
animation:rainbow 4s linear infinite;
text-shadow:
0 0 10px red,
0 0 20px cyan,
0 0 30px lime;
}

/* LOGIN BOX */

.loginbox{
background:rgba(0,0,0,0.75);
width:340px;
margin:40px auto;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px cyan;
border:2px solid cyan;
backdrop-filter:blur(6px);
}

/* INPUT */

input{
padding:15px;
margin:12px;
width:260px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
box-shadow:0 0 20px cyan;
}

/* BUTTON */

button{
padding:15px 30px;
background:linear-gradient(
45deg,
lime,
cyan
);
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
color:black;
box-shadow:0 0 25px cyan;
transition:0.3s;
margin:10px;
width:260px;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 35px lime;
}

p{
font-size:18px;
color:cyan;
margin-top:20px;
}

/* SELECT */

select{

padding:15px;

width:220px;

margin-top:20px;

font-size:18px;

border-radius:10px;

background:black;

color:white;

border:none;

outline:none;

box-shadow:
0 0 15px cyan;

}

/* RAINBOW */

@keyframes rainbow{

0%{color:red;}
20%{color:orange;}
40%{color:yellow;}
60%{color:lime;}
80%{color:cyan;}
100%{color:magenta;}

}

</style>

</head>

<body>

<div id="wavebg"></div>

<h1>
🔥 LOGIN PAGE 🔥
</h1>

<div class="loginbox">

<input
type="text"
id="username"
placeholder="Enter Username">

<br>

<input
type="password"
id="password"
placeholder="Enter Password">

<br>

<button onclick="login()">
🚀 LOGIN
</button>

<p>
JEE • 12th Central Login
</p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOGIN */

window.login =
async function(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(
username.trim() == ""
||
password.trim() == ""
){

alert(
"Enter Username & Password ❌"
);

return;

}

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){

alert("User Not Found ❌");

return;

}

const data =
userSnap.data();

/* PASSWORD CHECK */

if(
data.password != password
){

alert("Wrong Password ❌");

return;

}

/* LOGIN LIMIT */

let limit =
data.loginLimit || 999999;

let count =
data.loginCount || 0;

if(
count >= limit
&& limit != 999999
){

alert("Account Locked 🔒");

return;

}

/* LOGIN DATA */

const now =
new Date();

const loginData = {

date:
now.toLocaleDateString(),

time:
now.toLocaleTimeString(),

page:"Unknown"

};

/* SUCCESS */

alert("Login Success ✅");

/* ACCESS */

const access =
data.pageAccess;

/* CURRENT PAGE */

const currentPage =
new URLSearchParams(
window.location.search
).get("page");

/* BOTH ACCESS POPUP */

function showChoosePopup(){

const popup =
document.createElement("div");

popup.style.position = "fixed";
popup.style.top = "0";
popup.style.left = "0";
popup.style.width = "100%";
popup.style.height = "100%";

popup.style.background =
"rgba(0,0,0,0.85)";

popup.style.display = "flex";

popup.style.justifyContent =
"center";

popup.style.alignItems =
"center";

popup.style.zIndex = "9999";

const box =
document.createElement("div");

box.style.background = "#000";

box.style.padding = "25px";

box.style.borderRadius = "15px";

box.style.boxShadow =
"0 0 25px cyan";

box.style.textAlign = "center";

box.style.width = "300px";

const title =
document.createElement("h2");

title.innerHTML =
"🚀 Choose Page";

title.style.color = "cyan";

const select =
document.createElement("select");

select.innerHTML = `

<option value="jee">
🔥 JEE
</option>

<option value="12th">
📚 12TH
</option>

`;

const btn =
document.createElement("button");

btn.innerHTML =
"✅ OPEN";

btn.style.marginTop = "20px";

btn.onclick =
async function(){

loginData.page =
select.value.toUpperCase();

await updateDoc(userRef,{

loginCount:count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

if(select.value == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

};

box.appendChild(title);

box.appendChild(select);

box.appendChild(btn);

popup.appendChild(box);

document.body.appendChild(popup);

}

/* JEE PAGE LOGIN */

if(currentPage == "jee"){

if(
access == "jee"
||
access == "both"
){

loginData.page = "JEE";

await updateDoc(userRef,{

loginCount:count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else{

alert(
"12TH User Cannot Open JEE ❌"
);

}

}

/* 12TH PAGE LOGIN */

else if(currentPage == "12th"){

if(
access == "12th"
||
access == "both"
){

loginData.page = "12TH";

await updateDoc(userRef,{

loginCount:count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

alert(
"JEE User Cannot Open 12TH ❌"
);

}

}

/* CENTRAL LOGIN */

else{

if(access == "jee"){

loginData.page = "JEE";

await updateDoc(userRef,{

loginCount:count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(access == "12th"){

loginData.page = "12TH";

await updateDoc(userRef,{

loginCount:count + 1,

loginHistory:[
...(data.loginHistory || []),
loginData
]

});

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else if(access == "both"){

showChoosePopup();

}

}

}

</script>

</body>
</html>
