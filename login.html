<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
🔥 PREMIUM LOGIN 🔥
</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,

#000000,
#120000,
#001111,
#000022,
#000000

);

background-size:
400% 400%;

animation:
bgMove 5s linear infinite;

font-family:
'Poppins',
sans-serif;

overflow:hidden;

}

/* BACKGROUND GLOW */

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:

radial-gradient(

circle,

rgba(255,80,0,0.35),

transparent 70%

);

filter:blur(120px);

animation:
moveGlow 4s ease-in-out infinite alternate;

}

/* LOGIN BOX */

.box{

position:relative;

width:360px;

padding:38px 28px;

border-radius:35px;

background:
rgba(15,15,15,0.78);

backdrop-filter:
blur(18px);

border:
1px solid rgba(255,255,255,0.08);

box-shadow:

0 0 20px rgba(255,0,0,0.25),

0 0 35px rgba(0,255,255,0.18),

0 0 60px rgba(255,0,255,0.12);

text-align:center;

z-index:2;

animation:
rainbowGlow 1.2s linear infinite;

}

/* TITLE */

.box h1{

font-size:48px;

margin-bottom:35px;

font-weight:900;

letter-spacing:3px;

font-family:
'Orbitron',
sans-serif;

background:
linear-gradient(

90deg,

#ff0000,
#ff8800,
#ffff00,
#00ffcc,
#00aaff,
#ff00ff

);

background-size:
300% 300%;

animation:
textFlow 2s linear infinite;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 0 15px rgba(255,255,255,0.2),

0 0 35px rgba(255,0,255,0.25);

}

/* INPUT */

.box input{

width:100%;

padding:16px 18px;

margin-bottom:20px;

border:none;

outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

font-size:18px;

font-weight:600;

color:white;

box-shadow:

0 0 12px rgba(0,255,255,0.18),

0 0 25px rgba(255,0,255,0.08);

transition:0.3s;

}

.box input:focus{

transform:scale(1.03);

box-shadow:

0 0 18px cyan,

0 0 35px magenta,

0 0 50px orange;

}

/* BUTTON */

.box button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

font-size:20px;

font-weight:800;

cursor:pointer;

font-family:
'Orbitron',
sans-serif;

background:
linear-gradient(

90deg,

#ff0000,
#ff8800,
#ffff00,
#00ffcc,
#00aaff,
#ff00ff

);

background-size:
300% 300%;

animation:
textFlow 2s linear infinite;

color:white;

letter-spacing:3px;

box-shadow:

0 0 20px rgba(255,0,0,0.3),

0 0 40px rgba(0,255,255,0.2),

0 0 60px rgba(255,0,255,0.15);

transition:0.3s;

}

.box button:hover{

transform:
translateY(-4px)
scale(1.03);

box-shadow:

0 0 25px red,

0 0 45px cyan,

0 0 70px magenta;

}

/* PLACEHOLDER */

::placeholder{

color:
rgba(255,255,255,0.45);

}

/* POPUP */

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.88);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

.popupbox{

background:
rgba(20,20,20,0.95);

padding:35px;

border-radius:25px;

width:320px;

text-align:center;

border:
1px solid rgba(255,120,0,0.2);

box-shadow:
0 0 35px rgba(255,80,0,0.3);

}

.popupbox h2{

margin-bottom:25px;

font-size:28px;

font-family:
'Orbitron',
sans-serif;

background:
linear-gradient(
90deg,
#ff0000,
#00ffff,
#ff00ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.popupbox select{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:15px;

font-size:16px;

margin-bottom:20px;

background:
rgba(255,255,255,0.08);

color:white;

}

.popupbox button{

width:100%;

}

/* ANIMATIONS */

@keyframes moveGlow{

0%{
transform:
translate(-100px,-50px);
}

100%{
transform:
translate(120px,80px);
}

}

@keyframes rainbowGlow{

0%{
box-shadow:
0 0 25px red;
}

25%{
box-shadow:
0 0 30px orange;
}

50%{
box-shadow:
0 0 35px cyan;
}

75%{
box-shadow:
0 0 35px magenta;
}

100%{
box-shadow:
0 0 25px red;
}

}

@keyframes textFlow{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

</style>

</head>

<body>

<div class="box">

<h1>
🔥 LOGIN
</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
🚀 LOGIN
</button>

</div>

<script>

function login(){

alert(
"Add your Firebase login code here 🚀"
);

}

</script>

</body>
  </html>
