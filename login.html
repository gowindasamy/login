<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
🔥 ULTRA PREMIUM LOGIN 🔥
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,

#000000,
#140000,
#001111,
#220022,
#000000

);

background-size:
500% 500%;

animation:
bgMove 2.5s linear infinite;

font-family:
'Poppins',
sans-serif;

overflow-x:hidden;

}

/* BACKGROUND GLOW */

body::before{

content:"";

position:absolute;

width:700px;
height:700px;

background:

radial-gradient(

circle,

rgba(255,80,0,0.35),

transparent 70%

);

filter:blur(120px);

animation:
moveGlow 4s ease-in-out infinite alternate;

}

/* LOGIN BOX */

.box{

position:relative;

width:420px;

max-width:92%;

padding:45px 35px;

border-radius:32px;

background:
rgba(20,20,20,0.82);

backdrop-filter:
blur(18px);

border:
2px solid rgba(255,120,0,0.18);

box-shadow:

0 0 20px #ff2200,
0 0 40px #ff6600,
0 0 60px #ff00ff,
0 0 90px #00ffff;

text-align:center;

z-index:2;

animation:
ultraGlow 0.8s linear infinite;

}

/* TITLE */

.box h1{

font-size:56px;

margin-bottom:40px;

font-weight:900;

letter-spacing:4px;

background:
linear-gradient(

90deg,

#ff0000,
#ff6600,
#ffff00,
#00ffff,
#ff00ff

);

background-size:
400% 400%;

animation:
rainbowText 1s linear infinite;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 0 10px #ff0000,
0 0 25px #ff6600,
0 0 40px #ff00ff;

}

/* INPUT */

.box input{

width:100%;

padding:18px 22px;

margin-bottom:24px;

border:none;

outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.05);

font-size:20px;

color:white;

box-shadow:

inset 0 0 10px rgba(255,255,255,0.03),

0 0 18px rgba(255,80,0,0.12);

transition:0.3s;

}

.box input:focus{

transform:scale(1.02);

box-shadow:

0 0 20px cyan,
0 0 35px magenta,
0 0 50px orange;

}

/* BUTTON */

.box button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:22px;

font-weight:800;

cursor:pointer;

background:
linear-gradient(

90deg,

#ff0000,
#ff6600,
#ffff00,
#00ffff,
#ff00ff

);

background-size:
400% 400%;

animation:
rainbowText 1s linear infinite;

color:white;

letter-spacing:3px;

box-shadow:

0 0 20px #ff2200,
0 0 40px #ff6600,
0 0 70px #ff00ff;

transition:0.3s;

}

.box button:hover{

transform:
translateY(-4px)
scale(1.03);

box-shadow:

0 0 30px red,
0 0 50px cyan,
0 0 80px magenta;

}

/* PLACEHOLDER */

::placeholder{

color:
rgba(255,255,255,0.45);

}

/* POPUP */

.popup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.88);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

.popupbox{

background:
rgba(20,20,20,0.95);

padding:35px;

border-radius:25px;

width:350px;

max-width:92%;

text-align:center;

border:
1px solid rgba(255,120,0,0.2);

box-shadow:
0 0 35px rgba(255,80,0,0.3);

}

.popupbox h2{

margin-bottom:25px;

font-size:32px;

color:#ff8800;

}

.popupbox select{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:15px;

font-size:18px;

margin-bottom:20px;

background:
rgba(255,255,255,0.08);

color:white;

}

.popupbox button{

width:100%;

}

/* ANIMATIONS */

@keyframes moveGlow{

0%{
transform:
translate(-100px,-50px);
}

100%{
transform:
translate(120px,80px);
}

}

@keyframes ultraGlow{

0%{

box-shadow:

0 0 20px red,
0 0 40px orange,
0 0 60px magenta;

}

25%{

box-shadow:

0 0 25px cyan,
0 0 45px blue,
0 0 70px magenta;

}

50%{

box-shadow:

0 0 25px lime,
0 0 50px cyan,
0 0 80px red;

}

75%{

box-shadow:

0 0 30px yellow,
0 0 60px orange,
0 0 90px pink;

}

100%{

box-shadow:

0 0 20px red,
0 0 40px orange,
0 0 60px magenta;

}

}

@keyframes rainbowText{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

</style>

</head>

<body>

<div class="box">

<h1>
🔥 LOGIN
</h1>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
🚀 LOGIN
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyAV9WmHR_cY01i3UMLpwlbymjjz_sQT_80",

authDomain:
"tngslogin.firebaseapp.com",

projectId:
"tngslogin",

storageBucket:
"tngslogin.firebasestorage.app",

messagingSenderId:
"552680193680",

appId:
"1:552680193680:web:54db58e0e418a2b63aa215"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.login =
async function(){

let username =
document.getElementById(
"username"
).value.trim();

let password =
document.getElementById(
"password"
).value.trim();

if(!username || !password){

alert(
"Enter Username & Password ❌"
);

return;

}

const params =
new URLSearchParams(
window.location.search
);

let currentPage =
params.get("page");

const userRef =
doc(db,"users",username);

const userSnap =
await getDoc(userRef);

if(!userSnap.exists()){

alert("User Not Found ❌");

return;

}

const data =
userSnap.data();

if(data.password != password){

alert("Wrong Password ❌");

return;

}

let access =
data.pageAccess || [];

let count =
data.loginCount || 0;

let limit =
data.loginLimit || 999999;

if(
count >= limit
&& limit != 999999
){

alert(
"ACCOUNT LOCKED ❌"
);

return;

}

const now =
new Date();

const loginData = {

date:
now.toLocaleDateString(),

time:
now.toLocaleTimeString()

};

/* DIRECT PAGE LOGIN */

if(currentPage){

if(
!access.includes(currentPage)
){

alert("ACCESS DENIED ❌");

return;

}

loginData.page =
currentPage.toUpperCase();

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

if(currentPage == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(currentPage == "12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/TopperZone/?access=true";

}

return;

}

/* MULTI ACCESS */

if(access.length > 1){

showChoosePopup(
access,
userRef,
data,
count,
loginData
);

}

/* SINGLE ACCESS */

else{

const page =
access[0];

loginData.page =
page.toUpperCase();

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

if(page == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(page == "12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/TopperZone/?access=true";

}

}

}

/* CHOOSE POPUP */

window.showChoosePopup =
function(
access,
userRef,
data,
count,
loginData
){

const popup =
document.createElement("div");

popup.className =
"popup";

const box =
document.createElement("div");

box.className =
"popupbox";

box.innerHTML =

`
<h2>
🌍 Choose Page
</h2>
`;

const select =
document.createElement("select");

if(access.includes("jee")){

select.innerHTML +=

`
<option value="jee">
🔥 JEE
</option>
`;

}

if(access.includes("12th")){

select.innerHTML +=

`
<option value="12th">
📚 12TH
</option>
`;

}

if(access.includes("topperzone")){

select.innerHTML +=

`
<option value="topperzone">
🚀 TOPPERZONE
</option>
`;

}

const btn =
document.createElement("button");

btn.innerHTML =
"🚀 OPEN";

btn.onclick =
async function(){

let selected =
select.value;

loginData.page =
selected.toUpperCase();

await updateDoc(userRef,{

loginCount:
count + 1,

loginHistory:[

...(data.loginHistory || []),

loginData

]

});

if(selected == "jee"){

window.location.href =
"https://gowindasamy.github.io/jee/?access=true";

}

else if(selected == "12th"){

window.location.href =
"https://gowindasamy.github.io/12th/?access=true";

}

else{

window.location.href =
"https://gowindasamy.github.io/TopperZone/?access=true";

}

};

box.appendChild(select);

box.appendChild(btn);

popup.appendChild(box);

document.body.appendChild(
popup
);

}

</script>

</body>
  </html>
